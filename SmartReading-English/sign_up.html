<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="SRE(SmartReading-English)是提供臺灣等英語學習者閱讀英語讀本的學習平臺。SRE透過閱讀能力檢測對學習者進行英語閱讀能力評估後，再運用AI技術將學習者的英語閱讀程度和文本難度進行適性配對，並推薦適合學習者閱讀能力的英語讀本，增加學習者對英語閱讀的樂趣。當學習者閱讀文本後，可透過讀後測驗，了解自己對文本的理解程度。" />
    <title>SmartReading-English</title>
    <link rel="shortcut icon" type="image/x-icon" href="image/favicon.ico">

    <!-- this page widgets CSS -->
    <!-- modal -->
    <link rel="stylesheet" href="css/jquery.modal.min.css" />

    <!--fontawesome-->
    <link rel="stylesheet" href="css/fontawesome-free-6.1.1-web.min.css">

    <!-- my core CSS -->
    <link rel="stylesheet" type="text/css" href="css/SREstyles.css">

</head>

<body>
    <header class="header">
    </header>


    <div class="main sign_up">

        <div class="tittle">
            <h1>註冊</h1>
        </div>

        <div class="sign_up_area">
            <div class="account_area">
                <div class="register_item">
                    <label for="account">
                        Email
                    </label>
                    <input name="" type="text" placeholder="請輸入信箱" value="" class="account" id="account">
                    <button type="button" class="get_code_btn">取得驗證碼</button>
                </div>
                <div class="register_item">
                    <label for="user_code">驗證碼</label>
                    <input name="" type="text" placeholder="請輸入驗證碼" id="user_code">
                </div>
                <div class="register_item">
                    <label for="password">密碼</label>
                    <input name="" type="password" placeholder="請輸入密碼" id="password">
                </div>
                <div class="register_item">
                    <label for="review_password">確認密碼</label>
                    <input name="" type="password" placeholder="請再次輸入密碼" id="review_password">
                </div>
                <div class="sign_up_text prompts_text">
                    <p>
                        <i class="fa-solid fa-lightbulb"></i>「請填寫實際使用者的真實姓名。
                        若您是家長欲購買給孩子使用，請在此區塊填寫『孩子的資料』，以利系統提供正確的學習紀錄與個人化推薦。」
                    </p>
                </div>
                <div class="register_item">
                    <label for="Lname">姓</label>
                    <input name="" type="text" placeholder="請輸入姓" id="Lname">
                </div>
                <div class="register_item">
                    <label for="Fname">
                        名
                    </label>
                    <input name="" type="text" placeholder="請輸入名" id="Fname">
                </div>
                <div class="register_item">
                    <label for="city">
                        居住縣市
                    </label>
                    <select name="" id="city">
                        <option selected="selected" value="0">請選擇居住縣市</option>
                        <option value="1">台北市</option>
                        <option value="2">新北市</option>
                    </select>
                </div>
                <div class="register_item">
                    <label for="year">出生年份</label>
                    <select name="" id="year">
                        <option selected="selected" value="0">請選擇出生年份</option>
                        <option value="2017">2017</option>
                        <option value="2018">2018</option>
                        <option value="2019">2019</option>
                        <option value="2020">2020</option>
                    </select>
                </div>
                <div class="sign_up_text">
                    <a href="" target="_blank" class="sign_up_text_link">查看會員服務條款及隱私權政策</a>
                </div>
                <div class="register_item register_item_confirm">
                    <a href="#sign_up_done_modal" rel="modal:open" class="signup_btn">註冊</a>
                </div>
                <div class="register_item register_item_confirm">
                    <a href="login.html" class="signup_btn login_btn">返回登入</a>
                </div>
            </div>
        </div>

        <div id="sign_up_done_modal" class="modal sign_up_done_modal">
            <div class="sign_up_done_area">
                <div class="sign_up_done_content">
                    <h4 class="sign_up_done_title">會員註冊完成！</h4>

                    <div class="sign_up_done_text">
                        <p>
                            您的會員帳號已建立，請使用註冊的帳號Email與密碼登入。
                        </p>
                        <p>
                            立即前往<a href="http://">訂閱方案</a>，開啟您的英語適性閱讀之旅！
                        </p>
                    </div>

                    <div class="sign_up_done_link">
                        <a href="login.html">前往登入</a>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <footer>
    </footer>
    <script src="js/jquery-3.6.1.min.js"></script>

    <!-- this page widgets JS -->

    <!-- modal -->
    <script src="js/jquery.modal.min.js"></script>

    <!--fontawesome-->
    <script src="js/fontawesome-free-6.1.1.min.js"></script>

    <!-- my core JS -->
    <script src="js/all.js"></script>

    <script>


    </script>

    <script>
        $(document).ready(function () {
            $("header").load("header.html", function () {});
            $("footer").load("footer.html", function () {});
        });
    </script>
</body>
