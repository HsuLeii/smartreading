<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="SRE(SmartReading-English)是提供臺灣等英語學習者閱讀英語讀本的學習平臺。SRE透過閱讀能力檢測對學習者進行英語閱讀能力評估後，再運用AI技術將學習者的英語閱讀程度和文本難度進行適性配對，並推薦適合學習者閱讀能力的英語讀本，增加學習者對英語閱讀的樂趣。當學習者閱讀文本後，可透過讀後測驗，了解自己對文本的理解程度。" />
    <title>SmartReading-English</title>
    <link rel="shortcut icon" type="image/x-icon" href="image/favicon.ico">

    <!-- this page widgets CSS -->

    <!-- my core CSS -->
    <link rel="stylesheet" type="text/css" href="css/SREstyles.css">
</head>

<body>


    <header class="header">
    </header>

    <div class="slide slide_login">
        <div class="main login">
            <div class="login_text">
                <img src="image/photo/slide/login_text.png" alt="">
            </div>

            <div class="login_area dual_login">
                <div class="login_area_content login_area_content_school">
                    <div class="login_area_content_tittle">
                        <h4>
                            校園專案
                        </h4>
                    </div>
                    <div class="account_area">
                        <div class="account_secret_area">
                            <label for="email"><b>Username</b></label>
                            <input type="text" placeholder="" name="email" id="email" required>
                        </div>
                        <div class="account_secret_area">
                            <label for="psw"><b>Password</b></label>
                            <input type="password" placeholder="" name="psw" id="psw" required>
                        </div>
                        <input type="submit" value="Login" class="login_button" onclick="location.href='map.html'">

                        <div class="account_link_area">
                            <a id="ctl00_Content_body_LBTpSso" class="login_button"
                                href="javascript:__doPostBack('ctl00$Content_body$LBTpSso','')">
                                臺北市校園單一身分驗證(合作學校單位)</a>

                        </div>
                    </div>
                </div>

                <div class="login_area_content login_area_content_personal">
                    <div class="login_area_content_tittle">
                        <h4>
                            個人會員
                        </h4>
                    </div>
                    <div class="account_area">
                        <div class="account_secret_area">
                            <label for="email"><b>Username</b></label>
                            <input type="text" placeholder="" name="email" id="email" required>
                        </div>
                        <div class="account_secret_area">
                            <label for="psw"><b>Password</b></label>
                            <input type="password" placeholder="" name="psw" id="psw" required>
                        </div>
                        <input type="submit" value="Login" class="login_button" onclick="location.href='map.html'">
                    </div>
                    <div class="forget_password">
                        <a href="" class="forget_psw">忘記個人會員密碼？</a>
                    </div>
                    <div class="signup">
                        <p>還沒有個人會員嗎？</p>
                        <input type="submit" value="個人會員註冊" class="signup_button" onclick="location.href='sign_up.html'">
                    </div>
                </div>
            </div>

        </div>

    </div>

    <footer>
    </footer>
    <script src="js/jquery-3.6.1.min.js"></script>
    <script src="js/all.js"></script>

    <!-- this page widgets JS -->

    <script>
        $(document).ready(function () {
            $("header").load("header.html", function () {});
            $("footer").load("footer.html", function () {});
        });
    </script>

</body>

</html>
