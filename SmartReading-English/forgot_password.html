<!DOCTYPE html>
<html lang="zh-Hant-TW">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="SRE(SmartReading-English)是提供臺灣等英語學習者閱讀英語讀本的學習平臺。SRE透過閱讀能力檢測對學習者進行英語閱讀能力評估後，再運用AI技術將學習者的英語閱讀程度和文本難度進行適性配對，並推薦適合學習者閱讀能力的英語讀本，增加學習者對英語閱讀的樂趣。當學習者閱讀文本後，可透過讀後測驗，了解自己對文本的理解程度。" />
    <title>SmartReading-English</title>
    <link rel="shortcut icon" type="image/x-icon" href="image/favicon.ico">

    <!-- this page widgets CSS -->

    <!-- my core CSS -->
    <link rel="stylesheet" type="text/css" href="css/SREstyles.css">

</head>

<body>
    <header class="header">
    </header>


    <div class="main sign_up">

        <div class="tittle">
            <h1>忘記密碼</h1>
        </div>

        <div class="sign_up_area">
            <div class="account_area">
                <div class="register_item">
                    <label for="account">
                        Email
                    </label>
                    <input name="" type="text" placeholder="請輸入信箱" value="" class="account" id="account">
                    <button type="button" class="get_code_btn">取得驗證碼</button>
                </div>
                <div class="register_item">
                    <label for="user_code">驗證碼</label>
                    <input name="" type="text" placeholder="請輸入驗證碼" id="user_code">
                </div>
                <div class="register_item">
                    <label for="password">密碼</label>
                    <input name="" type="password" placeholder="請輸入密碼" id="password">
                </div>
                <div class="register_item">
                    <label for="review_password">確認密碼</label>
                    <input name="" type="password" placeholder="請再次輸入密碼" id="review_password">
                </div>
                
                
                <div class="register_item register_item_confirm change_password">
                    <input type="submit" value="確認更改" class="login_button">
                </div>
                <div class="register_item register_item_confirm">
                    <a href="login.html" class="signup_btn login_btn">返回登入</a>
                </div>
            </div>
        </div>
    </div>

    <footer>
    </footer>
    <script src="js/jquery-3.6.1.min.js"></script>

    <!-- this page widgets JS -->

    <!-- my core JS -->
    <script src="js/all.js"></script>

    <script>


    </script>

    <script>
        $(document).ready(function () {
            $("header").load("header.html", function () {});
            $("footer").load("footer.html", function () {});
        });
    </script>
</body>
